name: my-first-workflow
#To have a trigger on every push on this repo on any branch
on:
  push:
    branches:
      - dev
      - main
      - 'feature-*'

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr
          hostname
      - name: Step 2 - Checkout
        uses: actions/checkout@v6.0.2
      - name: Step - 3 
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
      - name: Upload Single File Artifact
        uses: actions/upload-artifact@v7
        with:
          name: single_file
          path: ./myartifact.txt
      - name: Upload Directory Artifact
        uses: actions/upload-artifact@v7
        with:
          name: directory_artifacts
          path: artifacts/
      - name: Upload All files as Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: all_files_as_artifacts
          path: |
            artifacts/ 
            ./myartifact.txt
      - name:  Upload Multiple Artifacts with exclusions
        uses: actions/upload-artifact@v7
        with:
          name: upload_multiple_artifacts_individually 
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt

  job2:
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Checking current directory
        run: |
          pwd
          ls -ltr
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: single_file
      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr
          
  job3:
    name: JOB3
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Checking current directory
        run: |
          pwd
          ls -ltr
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: directory_artifacts
      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr 
  job4:
   name: JOB4
   runs-on: ubuntu-latest
   steps:
     - name: Referring context or in-built variables
       run: | 
         echo "[INFO] Triggered by ${{ github.event_name }}"
         echo "[INFO] New changes are added by ${{ github.actor }} in ${{ github.ref_name }} branch" 
         echo "[INFO] This current step is running on ${{ runner.os }}"
         echo "The current job id is ${{ job.check_run_id }}"
         echo "The current environment is ${{ env }}"
         echo "The current saved secret is ${{ secrets.APP_PASSWORD }}"

  integration:
     name: STAGE DEPLOYMENT
     runs-on: ubuntu-latest
     steps:
       - name: Referring Environment Variables
         run: echo "[INFO] Running Deployment on ${{ vars.HOST }} by ${{ vars.USER }}"
       - name: Referring Environment Secrets
         run: echo "[INFO] Password for ${{ vars.HOST }} is ${{ vars.PASSWORD }}"
     environment:
       name: Integration
     if: github.ref == 'refs/heads/dev'  

  production:
    name: PROD DEPLOYMENT
    runs-on: ubuntu-latest
    steps:
      - name: Referring Environment Variables check
        run: echo "[INFO] Running Deployment on ${{ vars.HOST }} by ${{ vars.USER }}"
      - name: Referring Environment Secrets
        run: echo "[INFO] Password for ${{ vars.HOST }} is ${{ vars.PASSWORD }}"
    environment:
      name: Master
    if: github.head_ref == 'main'  
    
    
