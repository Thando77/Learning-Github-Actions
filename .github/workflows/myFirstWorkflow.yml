name: my-first-workflow
#To have a trigger on every push on this repo on any branch
on:
  push:
    branches:
      - dev
      - main
      - 'feature-*'

  pull_request:
    branches:
      - main


jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr
          hostname
      - name: Step 2 - Checkout
        uses: actions/checkout@v6.0.2
      - name: Step - 3 
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
      - name: Upload Single File Artifact
        uses: actions/upload-artifact@v7
        with:
          name: single_file
          path: ./myartifact.txt
      - name: Upload Directory Artifact
        uses: actions/upload-artifact@v7
        with:
          name: directory_artifacts
          path: artifacts/
      - name: Upload All files as Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: all_files_as_artifacts
          path: |
            artifacts/ 
            ./myartifact.txt
      - name:  Upload Multiple Artifacts with exclusions
        uses: actions/upload-artifact@v7
        with:
          name: upload_multiple_artifacts_individually 
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt

  job2:
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Checking current directory
        run: |
          pwd
          ls -ltr
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: single_file
      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr
          
  job3:
    name: JOB3
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Checking current directory
        run: |
          pwd
          ls -ltr
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: directory_artifacts
      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr           
