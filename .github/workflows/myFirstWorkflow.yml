name: my-first-workflow
#To have a trigger on every push on this repo on any branch
on:
  push:


jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr
          hostname
      - name: Step 2 - Checkout
        uses: actions/checkout@v6.0.2
      - name: Step - 3 
        run: |
          echo `pwd` >> myartifact.txt
          ls -ltr
          hostname
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: single_file
          path: ./myartifact.txt
